<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCFHS Nurse Technician Exam Simulator</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --accent: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid var(--bg); margin-bottom: 20px; padding-bottom: 10px; }
        .progress-container { width: 100%; background: #ddd; height: 10px; border-radius: 5px; margin-bottom: 20px; }
        #progress-bar { height: 100%; background: var(--secondary); width: 0%; border-radius: 5px; transition: 0.3s; }
        .question-box { display: none; }
        .question-box.active { display: block; }
        .vignette { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; line-height: 1.6; }
        .options-list { list-style: none; padding: 0; }
        .option-item { background: var(--bg); margin-bottom: 10px; padding: 15px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .option-item:hover { border-color: #bdc3c7; }
        .option-item.correct { border-color: var(--secondary); background: #e9f7ef; }
        .option-item.wrong { border-color: var(--accent); background: #fdf2f2; }
        .feedback { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; }
        .str-box { color: #c0392b; margin-bottom: 10px; font-style: italic; }
        .scfhs-box { color: #27ae60; font-weight: bold; }
        .nav-btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 1rem; margin-top: 20px; }
        .nav-btn:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>SCFHS Nursing Exam Simulator</h2>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <p id="stats">Question 1 of 10</p>
    </div>

    <div id="quiz-container">
        </div>

    <button id="next-btn" class="nav-btn" onclick="nextQuestion()" style="display:none;">Next Question</button>
</div>

<script>
    const quizData = [];

    let currentIdx = 0;
    let score = 0;

    function initQuiz() {
        const container = document.getElementById('quiz-container');
        quizData.forEach((item, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = `question-box ${index === 0 ? 'active' : ''}`;
            qDiv.id = `q-${index}`;
            qDiv.innerHTML = `
                <div class="vignette">${item.v}</div>
                <div class="options-list">
                    <div class="option-item" onclick="checkAnswer(this, 'A', ${index})">A. ${item.a}</div>
                    <div class="option-item" onclick="checkAnswer(this, 'B', ${index})">B. ${item.b}</div>
                    <div class="option-item" onclick="checkAnswer(this, 'C', ${index})">C. ${item.c}</div>
                    <div class="option-item" onclick="checkAnswer(this, 'D', ${index})">D. ${item.d}</div>
                </div>
                <div id="feedback-${index}" class="feedback">
                    <div class="str-box">${item.str}</div>
                    <div class="scfhs-box">${item.scfhs}</div>
                </div>
            `;
            container.appendChild(qDiv);
        });
        updateProgress();
    }

    function checkAnswer(element, choice, index) {
        const item = quizData[index];
        const feedback = document.getElementById(`feedback-${index}`);
        const options = document.getElementById(`q-${index}`).querySelectorAll('.option-item');
        
        // Prevent double clicking
        if(feedback.style.display === 'block') return;

        options.forEach(opt => opt.style.pointerEvents = 'none');

        if(choice === item.k) {
            element.classList.add('correct');
            score++;
        } else {
            element.classList.add('wrong');
            // Show correct answer too
            options[['A','B','C','D'].indexOf(item.k)].classList.add('correct');
        }

        feedback.style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        document.getElementById(`q-${currentIdx}`).classList.remove('active');
        currentIdx++;
        
        if(currentIdx < quizData.length) {
            document.getElementById(`q-${currentIdx}`).classList.add('active');
            document.getElementById('next-btn').style.display = 'none';
            updateProgress();
        } else {
            showResults();
        }
    }

    function updateProgress() {
        const progress = ((currentIdx + 1) / quizData.length) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;
        document.getElementById('stats').innerText = `Question ${currentIdx + 1} of ${quizData.length}`;
    }

    function showResults() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = `<div style="text-align:center;">
            <h3>Simulation Complete!</h3>
            <p style="font-size:2rem;">Score: ${score} / ${quizData.length}</p>
            <button class="nav-btn" onclick="location.reload()">Restart Exam</button>
        </div>`;
        document.getElementById('next-btn').style.display = 'none';
    }

    initQuiz();
</script>

</body>
</html>
