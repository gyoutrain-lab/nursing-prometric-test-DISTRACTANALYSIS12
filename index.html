<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCFHS Nursing Simulator | Nurse Technician | Level 4</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #b21f1f;
            --accent: #fdbb2d;
            --bg: #f8f9fa;
            --text: #333;
            --success: #28a745;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--text);
        }

        .screen { display: none; padding: 20px; max-width: 900px; margin: auto; }
        .active { display: block; }

        .welcome-card, .result-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-top: 50px;
        }

        input[type="text"] {
            padding: 12px;
            width: 80%;
            margin: 20px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .exam-header {
            background: var(--primary);
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-radius: 0 0 10px 10px;
        }

        .quiz-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 20px;
        }

        .vignette {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 25px;
            border-left: 5px solid var(--secondary);
            padding-left: 15px;
        }

        .options-grid { display: grid; gap: 12px; }

        .opt {
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            background: #fff;
            font-weight: 500;
            text-align: left;
        }

        .opt:hover { background: #f0f4ff; border-color: var(--primary); }
        .opt.selected { background: var(--primary); color: white; border-color: var(--primary); }

        #rationale-area {
            margin-top: 20px;
            padding: 20px;
            background: #e7f3ff;
            border-left: 5px solid var(--primary);
            border-radius: 8px;
            display: none;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-start { background: var(--primary); color: white; }
        .btn-next { background: var(--success); color: white; }
        .btn-rationale { background: var(--accent); color: #333; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 20px auto;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="welcome-screen" class="screen active">
        <div class="welcome-card">
            <h1>SCFHS NURSING MOCK V3</h1>
            <p>High-Level Clinical Vignettes | Nurse Technician  (Level 4 Difficulty)</p>
            <input type="text" id="candidate-name" placeholder="Enter Full Name">
            <br>
            <button class="btn btn-start" onclick="startExam()">Start Examination</button>
        </div>
    </div>

    <div id="exam-screen" class="screen">
        <div class="exam-header">
            <div id="display-name">Candidate</div>
            <div id="progress-text">Q 1/120</div>
            <div id="timer-text">00:00</div>
        </div>

        <div class="quiz-card">
            <div id="vignette" class="vignette">Loading question...</div>
            <div id="options" class="options-grid"></div>

            <div id="rationale-area"></div>

            <div style="margin-top: 30px; display: flex; gap: 10px;">
                <button class="btn btn-rationale" id="rat-btn" onclick="showRationale()" disabled>Show Rationale</button>
                <button class="btn btn-next" id="next-btn" onclick="nextQuestion()" disabled>Next Question</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <div class="result-card">
            <h2>Results Summary</h2>
            <div id="score-display" class="score-circle">0%</div>
            <p id="feedback-text"></p>
            <button class="btn btn-start" onclick="location.reload()">Restart</button>
        </div>
    </div>

<script>
    // DATA SOURCE (Replace/Add your 1-120 items here)
    const rawQuestions = [

        {
            id: 3,

            str: "STR: Check for bleeding (A) as the neck is a very vascular area.",

        {

    let currentQuestionIndex = 0;
    let score = 0;
    let timerInterval;
    let secondsElapsed = 0;
    let selectedOption = null;

    function startExam() {
        const nameInput = document.getElementById('candidate-name').value;
        if (!nameInput) return alert("Please enter your name");
        
        document.getElementById('display-name').innerText = "Nurse: " + nameInput;
        document.getElementById('welcome-screen').classList.remove('active');
        document.getElementById('exam-screen').classList.add('active');
        
        startTimer();
        loadQuestion();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            secondsElapsed++;
            let mins = Math.floor(secondsElapsed / 60);
            let secs = secondsElapsed % 60;
            document.getElementById('timer-text').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
    }

    function loadQuestion() {
        const q = rawQuestions[currentQuestionIndex];
        selectedOption = null;
        
        document.getElementById('progress-text').innerText = `Q ${currentQuestionIndex + 1}/${rawQuestions.length}`;
        document.getElementById('vignette').innerText = q.v;
        document.getElementById('rationale-area').style.display = 'none';
        document.getElementById('next-btn').disabled = true;
        document.getElementById('rat-btn').disabled = true;

        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';

        const letters = ['A', 'B', 'C', 'D'];
        const choiceTexts = [q.a, q.b, q.c, q.d];

        choiceTexts.forEach((text, index) => {
            const button = document.createElement('button');
            button.className = 'opt';
            button.innerText = `${letters[index]}. ${text}`;
            button.onclick = () => selectChoice(button, letters[index]);
            optionsDiv.appendChild(button);
        });
    }

    function selectChoice(element, letter) {
        const allOpts = document.querySelectorAll('.opt');
        allOpts.forEach(opt => opt.classList.remove('selected'));
        element.classList.add('selected');
        
        selectedOption = letter;
        document.getElementById('next-btn').disabled = false;
        document.getElementById('rat-btn').disabled = false;
    }

    function showRationale() {
        const q = rawQuestions[currentQuestionIndex];
        const area = document.getElementById('rationale-area');
        
        area.innerHTML = `
            <p><strong>Correct Answer: ${q.k}</strong></p>
            <p><strong>Strategy:</strong> ${q.str}</p>
            <p><strong>Rationale:</strong> ${q.scfhs}</p>
        `;
        area.style.display = 'block';
    }

    function nextQuestion() {
        if (selectedOption === rawQuestions[currentQuestionIndex].k) {
            score++;
        }

        currentQuestionIndex++;

        if (currentQuestionIndex < rawQuestions.length) {
            loadQuestion();
        } else {
            finishExam();
        }
    }

    function finishExam() {
        clearInterval(timerInterval);
        document.getElementById('exam-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        
        const percent = Math.round((score / rawQuestions.length) * 100);
        document.getElementById('score-display').innerText = percent + "%";
        
        const feedback = percent >= 70 ? "Excellent! You are ready for the SCFHS Exam." : "Keep practicing. Focus on Safety Protocols.";
        document.getElementById('feedback-text').innerText = feedback;
    }
</script>
</body>
</html>
